name: Release

# On every push to main, release ONLY when ALL guards pass (#190 + #192):
#   1. the app version was bumped past the latest v* tag,
#   2. a matching src/patchnotes/<version>.json exists (#192), AND
#   3. a signing key secret (TAURI_SIGNING_PRIVATE_KEY) is configured.
# With no key configured (today — the updater is a deferred-key skeleton) the build
# job is skipped and the workflow no-ops with a clear notice. Adding the secret + a
# version bump (with patch notes) later activates it with no further code changes.
#
# When all hold, build a universal macOS bundle and create a DRAFT GitHub release
# carrying the .dmg + the Tauri updater artifacts (.app.tar.gz, .sig, latest.json).
# The release body is generated from the version's patch notes (#192), which flows
# into latest.json's `notes` → the app's `update.body`, so an older client can read a
# not-yet-installed update's notes. A maintainer then publishes the draft.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Release guards
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      has_key: ${{ steps.secret.outputs.has_key }}
      has_notes: ${{ steps.notes.outputs.has_notes }}
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags for the comparison

      - id: guard
        name: Compare config version to the latest tag
        run: |
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          latest="${latest#v}"
          if [ -z "$latest" ]; then
            echo "No prior tag — releasing v$version."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$version" != "$latest" ] && \
               [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -n1)" = "$version" ]; then
            echo "Version bumped $latest -> $version — releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $version is not higher than $latest — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - id: secret
        name: Check for the signing key
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # A boolean only — never echo the secret itself. Secrets aren't available
          # in job-level `if:`, so the release job gates on this output instead.
          if [ -n "$SIGNING_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No TAURI_SIGNING_PRIVATE_KEY secret — skipping release (the updater is a deferred-key skeleton, #190)."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - id: notes
        name: Require matching patch notes (#192)
        run: |
          # Force per-version patch notes: the release body / latest.json notes come
          # from src/patchnotes/<version>.json, so a missing/mismatched file ends the
          # release early (the card's "check the version is up to date — if not, end").
          version="${{ steps.guard.outputs.version }}"
          file="src/patchnotes/${version}.json"
          if [ ! -f "$file" ]; then
            echo "::notice::No patch notes ($file) for v$version — skipping release."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          elif [ "$(node -p "require('./${file}').version")" != "$version" ]; then
            echo "::notice::Patch-notes version in $file does not match v$version — skipping release."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build + draft release
    needs: check
    # All guards: a version bump, matching patch notes (#192), AND a configured
    # signing key. Any missing -> this job is skipped and the workflow ends green.
    if: >-
      needs.check.outputs.should_release == 'true' &&
      needs.check.outputs.has_notes == 'true' &&
      needs.check.outputs.has_key == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - id: body
        name: Generate release notes from patch notes (#192)
        run: |
          # The version's patch notes → the release body, which tauri-action also
          # writes into latest.json's `notes` → the app's `update.body`.
          {
            echo "md<<PATCHNOTES_EOF"
            node scripts/patchnotes-to-md.mjs "${{ needs.check.outputs.version }}"
            echo "PATCHNOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build universal bundle + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target universal-apple-darwin
          tagName: v${{ needs.check.outputs.version }}
          releaseName: ReCue v${{ needs.check.outputs.version }}
          releaseBody: ${{ steps.body.outputs.md }}
          releaseDraft: true
          prerelease: false
