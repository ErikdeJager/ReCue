name: Release

# On every push to main, release ONLY if the app version was bumped past the
# latest v* tag. If bumped, build a universal macOS bundle and create a DRAFT
# GitHub release carrying the .dmg + the Tauri updater artifacts (.app.tar.gz,
# .sig, latest.json). A maintainer then publishes the draft for clients to see.

# Temporarily disabled — automatic release-on-push is turned off for now.
# To re-enable, uncomment the `push` trigger below (and optionally remove the
# `workflow_dispatch` line). Until then this workflow only runs if triggered
# manually from the Actions tab.
on:
  workflow_dispatch: {}
  # push:
  #   branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Version-bump guard
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags for the comparison

      - id: guard
        name: Compare config version to the latest tag
        run: |
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          latest="${latest#v}"
          if [ -z "$latest" ]; then
            echo "No prior tag — releasing v$version."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$version" != "$latest" ] && \
               [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -n1)" = "$version" ]; then
            echo "Version bumped $latest -> $version — releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $version is not higher than $latest — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build + draft release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build universal bundle + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target universal-apple-darwin
          tagName: v${{ needs.check.outputs.version }}
          releaseName: ClaudeCue v${{ needs.check.outputs.version }}
          releaseDraft: true
          prerelease: false
