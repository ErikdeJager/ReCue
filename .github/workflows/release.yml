name: Release

# On every push to main, release ONLY when the app version was bumped past the latest
# v* tag. Patch notes are now GENERATED automatically (not required to pre-exist):
#
#   prepare        — version gate; if releasing, generate src/patchnotes/<version>.json
#                    with Claude (summarizing every change since the last release tag),
#                    commit it back to main with [skip ci] so the accumulated history is
#                    baked into this and future builds, and emit the release body.
#   create-release — open ONE draft GitHub release.
#   release        — 2-OS matrix (macOS universal + Windows x86_64) builds SIGNED
#                    updater artifacts from the commit that includes the new notes and
#                    uploads them to the draft, merging one latest.json. On macOS it then
#                    polishes the .dmg (parks the DMG's hidden helper files off-canvas via
#                    scripts/polish-dmg.sh) and swaps it for the uploaded asset —
#                    best-effort, so it can never fail the release.
#
# A maintainer then PUBLISHES the draft — the updater endpoint
# /releases/latest/download/latest.json only resolves to a non-draft "latest" release.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    name: Version gate + generate patch notes
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      version: ${{ steps.guard.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
      body: ${{ steps.body.outputs.md }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags for the comparison + a base to commit onto

      - id: guard
        name: Compare config version to the latest tag
        run: |
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          latest="${latest#v}"
          if [ -z "$latest" ]; then
            echo "No prior tag — releasing v$version."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$version" != "$latest" ] && \
               [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -n1)" = "$version" ]; then
            echo "Version bumped $latest -> $version — releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $version is not higher than $latest — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.should_release == 'true'
        run: npm ci

      - name: Generate patch notes with Claude (#192)
        # TEMPORARILY DISABLED for the v1.0.0 first public release: the patch notes are
        # hand-authored (src/patchnotes/1.0.0.json) and must not be touched by the model.
        # Re-enable for the NEXT release by restoring the original condition:
        #   if: steps.guard.outputs.should_release == 'true'
        if: false
        # Summarizes every change since the last release tag into
        # src/patchnotes/<version>.json. No-ops if the file was hand-authored
        # (a manual file always wins). Fails the run if generation fails — we do
        # not ship a release with empty notes.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: node scripts/generate-patchnotes.mjs

      - id: commit
        name: Commit generated patch notes back to main
        if: steps.guard.outputs.should_release == 'true'
        run: |
          version="${{ steps.guard.outputs.version }}"
          # Persist the notes so they're baked into this build AND glob into every
          # future build's "previous versions" history. [skip ci] stops this push
          # from re-triggering the workflow.
          if [ -n "$(git status --porcelain -- src/patchnotes)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "src/patchnotes/${version}.json"
            git commit -m "Add patch notes for v${version} [skip ci]"
            git push origin HEAD:main
            echo "Committed and pushed generated patch notes for v${version}."
          else
            echo "Patch notes for v${version} already present — no commit needed."
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: body
        name: Generate release notes markdown from patch notes
        if: steps.guard.outputs.should_release == 'true'
        run: |
          # Feeds the GitHub release body AND latest.json's `notes` (→ the app's
          # update.body) on both matrix legs. Run on Linux so the heredoc is bash.
          {
            echo "md<<PATCHNOTES_EOF"
            node scripts/patchnotes-to-md.mjs "${{ steps.guard.outputs.version }}"
            echo "PATCHNOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  create-release:
    name: Create draft release
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - id: create
        # Create exactly ONE draft release up front (targeting the commit that includes
        # the generated notes) and hand its numeric id to the matrix. The build legs
        # upload by releaseId, not by tag — GitHub's get-release-by-tag API doesn't
        # return drafts, so a tag-based matrix can spawn duplicate drafts.
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.prepare.outputs.body }}
        with:
          result-encoding: string
          script: |
            const tag = `v${{ needs.prepare.outputs.version }}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: `${{ needs.prepare.outputs.sha }}`,
              name: `ReCue ${tag}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id.toString();

  release:
    name: Build + upload (${{ matrix.platform }})
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      # Serialize the legs so the latest.json read-modify-write merge on the shared
      # release is deterministic (macOS writes the darwin entries; Windows reads that,
      # appends windows-x86_64, writes back).
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the commit that includes the generated patch notes (baked into
          # the bundle via import.meta.glob over src/patchnotes/*.json).
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build + upload signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ needs.prepare.outputs.body }}
          args: ${{ matrix.args }}

      # macOS only: the .dmg tauri-action just built leaves its dot-prefixed helper files
      # (.background, .VolumeIcon.icns, …) unpositioned, so a user with "show hidden files"
      # on sees them auto-arranged into the install window. Park them off-canvas. This is
      # the DMG meant for manual download (NOT an updater artifact, so signatures/latest.json
      # are untouched). Best-effort — continue-on-error so a hiccup keeps the unpolished DMG.
      - name: Polish DMG (hide helper files off-canvas)
        id: polish
        if: matrix.platform == 'macos-latest'
        continue-on-error: true
        run: |
          dmg="$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | grep -v '/rw\.' | head -1)"
          if [ -z "$dmg" ]; then echo "::warning::No DMG found to polish."; exit 0; fi
          chmod +x scripts/polish-dmg.sh
          ./scripts/polish-dmg.sh "$dmg"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      - name: Replace release DMG with the polished one
        if: matrix.platform == 'macos-latest' && steps.polish.outputs.dmg != ''
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DMG_PATH: ${{ steps.polish.outputs.dmg }}
          DMG_NAME: ${{ steps.polish.outputs.name }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const release_id = Number(process.env.RELEASE_ID);
            const name = process.env.DMG_NAME;
            // Drop the unpolished .dmg asset tauri-action uploaded, then upload the polished
            // file under the same name. Keyed by release id (drafts aren't tag-resolvable).
            const assets = await github.rest.repos.listReleaseAssets({ owner, repo, release_id, per_page: 100 });
            for (const a of assets.data) {
              if (a.name.endsWith('.dmg')) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
                console.log(`Deleted old asset ${a.name}`);
              }
            }
            const data = fs.readFileSync(process.env.DMG_PATH);
            await github.rest.repos.uploadReleaseAsset({
              owner, repo, release_id, name,
              headers: { 'content-type': 'application/x-apple-diskimage', 'content-length': data.length },
              data,
            });
            console.log(`Uploaded polished ${name} (${data.length} bytes)`);
