name: Release

# On every push to main, release ONLY when BOTH guards pass:
#   1. the app version was bumped past the latest v* tag, AND
#   2. a matching src/patchnotes/<version>.json exists (#192).
# The signing key is now configured in repo secrets, so the former deferred-key skip
# (#190) is gone — the pipeline actually runs and publishes.
#
# Builds SIGNED Tauri updater artifacts for macOS (universal) AND Windows (x86_64),
# uploads them to ONE draft GitHub release, and produces a single merged latest.json
# (darwin-aarch64, darwin-x86_64, windows-x86_64). The release body is generated from
# the version's patch notes (#192), which flows into latest.json's `notes` → the app's
# `update.body`. A maintainer then PUBLISHES the draft — the updater endpoint
# /releases/latest/download/latest.json only resolves to a non-draft "latest" release.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Release guards
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      has_notes: ${{ steps.notes.outputs.has_notes }}
      version: ${{ steps.guard.outputs.version }}
      body: ${{ steps.body.outputs.md }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags for the comparison

      - id: guard
        name: Compare config version to the latest tag
        run: |
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          latest="${latest#v}"
          if [ -z "$latest" ]; then
            echo "No prior tag — releasing v$version."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$version" != "$latest" ] && \
               [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -n1)" = "$version" ]; then
            echo "Version bumped $latest -> $version — releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $version is not higher than $latest — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - id: notes
        name: Require matching patch notes (#192)
        run: |
          # Force per-version patch notes: the release body / latest.json notes come
          # from src/patchnotes/<version>.json, so a missing/mismatched file ends the
          # release early.
          version="${{ steps.guard.outputs.version }}"
          file="src/patchnotes/${version}.json"
          if [ ! -f "$file" ]; then
            echo "::notice::No patch notes ($file) for v$version — skipping release."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          elif [ "$(node -p "require('./${file}').version")" != "$version" ]; then
            echo "::notice::Patch-notes version in $file does not match v$version — skipping release."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - id: body
        name: Generate release notes from patch notes (#192)
        if: steps.notes.outputs.has_notes == 'true'
        run: |
          # Generated ONCE here (Linux runner → bash by default, so the heredoc works)
          # and exposed as a job output, then fed to tauri-action as releaseBody on
          # BOTH matrix legs — so the GitHub release body AND latest.json `notes` carry
          # the patch notes. Doing it here avoids a bash-heredoc step on the Windows
          # runner (whose default shell is PowerShell).
          {
            echo "md<<PATCHNOTES_EOF"
            node scripts/patchnotes-to-md.mjs "${{ steps.guard.outputs.version }}"
            echo "PATCHNOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  create-release:
    name: Create draft release
    needs: check
    if: needs.check.outputs.should_release == 'true' && needs.check.outputs.has_notes == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - id: create
        # Create exactly ONE draft release up front and hand its numeric id to the
        # matrix. The build legs upload by releaseId (not by tag): GitHub's
        # get-release-by-tag API doesn't return drafts, so a tag-based matrix can spawn
        # duplicate drafts — uploading by id is unambiguous.
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.check.outputs.body }}
        with:
          result-encoding: string
          script: |
            const tag = `v${{ needs.check.outputs.version }}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ReCue ${tag}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id.toString();

  release:
    name: Build + upload (${{ matrix.platform }})
    needs: [check, create-release]
    strategy:
      fail-fast: false
      # Serialize the legs so the latest.json read-modify-write merge on the shared
      # release is deterministic (macOS writes the darwin entries; Windows reads that,
      # appends windows-x86_64, writes back).
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build + upload signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ needs.check.outputs.body }}
          args: ${{ matrix.args }}
