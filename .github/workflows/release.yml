name: Release

# On every push to main, release ONLY when the app version was bumped past the latest
# v* tag AND no GitHub release (draft or published) already carries that version's tag.
# The release body is CONSTRUCTED on the fly from git history — nothing is generated or
# committed back to the repo:
#
#   prepare        — version gate: the config version must be a strict bump past the
#                    latest v* tag AND have no existing release (draft or published) for
#                    v<version>. If releasing, read the current version and ask Claude to
#                    construct the release body (markdown) from every change since the
#                    last release tag. No file is written and nothing is committed back.
#   create-release — open ONE draft GitHub release.
#   release        — 3-OS matrix (macOS universal + Windows x86_64 + Linux x86_64
#                    AppImage, #345) builds SIGNED updater artifacts from the triggering
#                    commit and uploads them to the draft, merging one latest.json. On
#                    macOS it then polishes the .dmg
#                    (parks the DMG's hidden helper files off-canvas via
#                    scripts/polish-dmg.sh) and swaps it for the uploaded asset —
#                    best-effort, so it can never fail the release.
#   tag            — once the matrix has fully built, tag the triggering commit v<version>.
#                    A draft never creates the git tag itself, so this tags the commit now
#                    rather than only when a maintainer later publishes the draft. It also
#                    makes the prepare gate idempotent: a re-push of the same version then
#                    sees the tag and skips.
#
# A maintainer then PUBLISHES the draft — the updater endpoint
# /releases/latest/download/latest.json only resolves to a non-draft "latest" release.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    name: Version gate + construct release body
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      version: ${{ steps.guard.outputs.version }}
      sha: ${{ github.sha }}
      body: ${{ steps.body.outputs.md }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags + history for the version gate and the diff range

      - id: guard
        name: Version gate (bumped past latest tag + no existing release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # 1) Must be a strict version bump past the latest v* tag.
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n1)"
          latest="${latest#v}"
          should_release=false
          if [ -z "$latest" ]; then
            echo "No prior tag — candidate release v$version."
            should_release=true
          elif [ "$version" != "$latest" ] && \
               [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -n1)" = "$version" ]; then
            echo "Version bumped $latest -> $version — candidate release."
            should_release=true
          else
            echo "::notice::Version $version is not higher than $latest — skipping release."
          fi

          # 2) Don't double-release: skip if a GitHub release (draft OR published) already
          #    carries the v$version tag. Drafts don't create a git tag, so the tag check
          #    above can't catch an unpublished draft left by a previous run on the same
          #    version — this closes that gap. Fail-open if the API can't be read (the
          #    version-bump check above remains the primary guard).
          if [ "$should_release" = "true" ]; then
            if gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq '.[].tag_name' \
                 2>/dev/null | grep -qx "v$version"; then
              echo "::notice::A release for v$version already exists — skipping."
              should_release=false
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Install Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.should_release == 'true'
        run: npm ci

      - id: body
        name: Construct release body with Claude
        if: steps.guard.outputs.should_release == 'true'
        # Asks Claude to summarize every change SINCE THE LAST RELEASE TAG (the range is
        # derived from the latest v* tag — git tag -l 'v*' --sort=-version:refname — so
        # with v1.0.0 tagged the next release only covers v1.0.0..HEAD) into the release
        # body markdown, printed to stdout. NOTHING is written to disk or committed back.
        # The body feeds the GitHub release AND latest.json's `notes` (→ the app's
        # update.body) on both matrix legs. Fails the run if construction fails — we do
        # not ship a release with an empty body. Run on Linux so the heredoc is bash.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: |
          body="$(node scripts/generate-release-body.mjs)"
          {
            echo "md<<PATCHNOTES_EOF"
            echo "$body"
            echo "PATCHNOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  create-release:
    name: Create draft release
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - id: create
        # Create exactly ONE draft release up front (targeting the triggering commit)
        # and hand its numeric id to the matrix. The build legs
        # upload by releaseId, not by tag — GitHub's get-release-by-tag API doesn't
        # return drafts, so a tag-based matrix can spawn duplicate drafts.
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.prepare.outputs.body }}
        with:
          result-encoding: string
          script: |
            const tag = `v${{ needs.prepare.outputs.version }}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: `${{ needs.prepare.outputs.sha }}`,
              name: `ReCue ${tag}`,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,
            });
            return data.id.toString();

  release:
    name: Build + upload (${{ matrix.platform }})
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      # Serialize the legs so the latest.json read-modify-write merge on the shared
      # release is deterministic (macOS writes the darwin entries; Windows reads that,
      # appends windows-x86_64; Linux reads that, appends linux-x86_64; each writes back).
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: x86_64-pc-windows-msvc
          # Linux (#345): AppImage-only (one universal binary runs on Arch/Ubuntu/Mint &
          # others). Built on ubuntu-22.04 for the broadest glibc/webkit2gtk-4.1 floor
          # (runs on Ubuntu 22.04+, Mint 21 AND 22, current Arch). No explicit --target
          # (native x86_64-linux); `--bundles appimage` keeps it AppImage-only, and
          # createUpdaterArtifacts adds the minisign-signed linux-x86_64 updater entry to
          # latest.json (the AppImage self-updates; the leg runs last so the serialized
          # latest.json merge appends after darwin + windows).
          - platform: ubuntu-22.04
            args: --bundles appimage
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the triggering commit (any hand-authored src/patchnotes/*.json is
          # baked into the bundle via import.meta.glob; the release body is constructed
          # separately in `prepare` and passed through as needs.prepare.outputs.body).
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      # Linux (#345): the Tauri 2 / AppImage build toolchain. webkit2gtk-4.1 is the
      # Tauri-2 webview; libayatana-appindicator3 the tray; librsvg2 icon rendering;
      # patchelf + the wget/file/curl utilities are needed by linuxdeploy when packing the
      # AppImage. ubuntu-22.04 ships all of these. macOS/Windows legs skip this step.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            patchelf

      # macOS code signing so mic/voice and protected-folder permissions ACTUALLY WORK and
      # PERSIST across relaunches (#292/#314). macOS TCC pins a permission grant to the app's
      # code signature; an unsigned/ad-hoc app has no stable identity, so grants never stick
      # and the prompt reappears (and, with Hardened Runtime OFF + no audio-input entitlement,
      # "Allow" can't even grant). A signature with Hardened Runtime + Entitlements.plist's
      # audio-input entitlement + a stable Designated Requirement fixes both halves — and the
      # Tauri bundler only applies the entitlements + Hardened Runtime WHEN A SIGNING IDENTITY
      # IS CONFIGURED, which is why a plain (identity-less) build stays ad-hoc.
      #
      # This step supports TWO independent modes, selected purely by which secrets are set:
      #   * SIGN-ONLY (self-signed, no Apple account): set the 4 signing secrets below. We
      #     build a keychain that TRUSTS the self-signed cert (see the run: block for why)
      #     and hand the bundler only the identity → it signs with Hardened Runtime +
      #     entitlements + a stable cert DR → grants work and persist. Gatekeeper still warns
      #     on a downloaded build (not notarized).
      #   * SIGN + NOTARIZE (Developer ID): additionally set the 3 notarization secrets → the
      #     build is also notarized, clearing Gatekeeper for arbitrary downloaders.
      #
      # KEY POINT: we do the keychain import + TRUST ourselves and pass the bundler ONLY
      # APPLE_SIGNING_IDENTITY — never APPLE_CERTIFICATE. Handing the bundler the certificate
      # makes it import into its own fresh keychain and resolve the identity with
      # `security find-identity -v -p codesigning` (VALID only); a self-signed cert is
      # untrusted (CSSMERR_TP_NOT_TRUSTED) so it is not "valid" and the bundler dies with
      # "failed to resolve signing identity" (the v1.1.3 failure). Trusting the cert
      # (`sudo security add-trusted-cert -d` — the ADMIN trust domain; the user domain would
      # pop a GUI auth dialog that hangs the headless runner) makes it resolve; codesign
      # itself never needs trust, only that -v lookup does. A real Developer-ID cert is
      # trusted by default, so the trust step is a harmless no-op for the notarized path.
      #
      # Trap to avoid — the bundler reads notarization creds with std::env::var_os, which
      # returns Some("") for a present-but-empty variable, NOT None: an empty
      # APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID reads as "creds provided" → the bundler tries
      # to notarize with empty creds → the build FAILS. So the notarization vars are exported
      # ONLY when all three are non-empty; otherwise they stay UNSET and the bundler cleanly
      # skips notarization and signs-only.
      # With NO signing secrets, every APPLE_* stays unset and tauri-action ad-hoc-signs
      # exactly as before — the build still succeeds (signing is opt-in, never mandatory).
      # macOS leg only — the Windows leg never runs it, so it never sees any Apple env.
      #
      # Repo secrets (Settings ▸ Secrets and variables ▸ Actions):
      #   SIGN-ONLY (self-signed — run scripts/gen-macos-ci-cert.sh to set these):
      #     APPLE_CERTIFICATE           — base64 of the self-signed code-signing .p12
      #     APPLE_CERTIFICATE_PASSWORD  — the .p12 export password
      #     APPLE_SIGNING_IDENTITY      — the cert's CN, e.g. "ReCue Self Signed"
      #     KEYCHAIN_PASSWORD           — any throwaway password for the CI keychain
      #   + NOTARIZE (Developer ID — optional, needs an Apple account):
      #     APPLE_SIGNING_IDENTITY becomes "Developer ID Application: Name (TEAMID)"
      #     APPLE_ID                    — the Apple ID email
      #     APPLE_PASSWORD              — an app-specific password for that Apple ID
      #     APPLE_TEAM_ID               — the 10-char Apple Developer Team ID
      # See docs/macos-permissions.md for the full setup.
      - name: Configure Apple signing (macOS — sign-only or sign+notarize by which secrets are set)
        id: applesign
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # SIGNING: enable only when BOTH cert + identity are present. The identity string is
          # opaque to codesign, so this works for a self-signed cert AND a Developer ID cert.
          # Absent → leave every APPLE_* unset so tauri-action ad-hoc-signs (build succeeds).
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Apple signing DISABLED (APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY not set) — ad-hoc fallback."
            echo "signing=disabled" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Apple signing ENABLED (own keychain, self-signed cert trusted)."
          echo "signing=enabled" >> "$GITHUB_OUTPUT"

          # Build a keychain that TRUSTS the cert, then hand the bundler ONLY the identity
          # name (never APPLE_CERTIFICATE — see the note above for why). This is what makes a
          # self-signed identity resolve under the bundler's `find-identity -v` lookup.
          KC="$RUNNER_TEMP/recue-signing.keychain-db"
          P12="$RUNNER_TEMP/recue-cert.p12"
          CER="$RUNNER_TEMP/recue-cert.pem"
          KCPW="${KEYCHAIN_PASSWORD:-$(openssl rand -base64 18 | tr -d '\n')}"

          # Decode the base64 .p12 secret (single-line, from `openssl base64 -A`; -A also
          # tolerates any wrapping). openssl base64 works on both LibreSSL and OpenSSL 3.
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$P12"

          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          # Import the identity (cert + private key); grant the code-signing tools access.
          security import "$P12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          # Trust the (self-signed) cert so find-identity -v treats the identity as valid.
          # Pull the cert straight from the keychain — no `openssl pkcs12`, which needs the
          # legacy provider the runner's OpenSSL may lack. Trust it in the ADMIN domain via
          # `sudo` (passwordless on GitHub runners): a USER-domain add-trusted-cert pops a
          # GUI authorization dialog that HANGS the headless runner forever, whereas
          # `sudo add-trusted-cert -d` writes the system trust store non-interactively. Trust
          # settings are keyed by the cert, so the identity (cert+key in our build keychain)
          # then evaluates as valid even though the trust anchor lives in System.keychain.
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KC" > "$CER"
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain "$CER"
          # Let codesign use the private key non-interactively.
          security set-key-partition-list -S apple-tool:,apple: -k "$KCPW" "$KC" >/dev/null
          # Put our keychain on the user search list so the bundler finds the identity.
          security list-keychains -d user -s "$KC" \
            $(security list-keychains -d user | sed -e 's/^[[:space:]]*"//' -e 's/"$//')
          rm -f "$P12" "$CER"

          # Fail fast here (with a clear message) instead of leaving the bundler to emit its
          # opaque "failed to resolve signing identity" if trust setup didn't take.
          if ! security find-identity -v -p codesigning "$KC" | grep -qF "$APPLE_SIGNING_IDENTITY"; then
            echo "::error::Signing identity '$APPLE_SIGNING_IDENTITY' did not resolve as valid after trust setup."
            security find-identity -v -p codesigning "$KC" || true
            exit 1
          fi
          echo "Signing identity resolved:"
          security find-identity -v -p codesigning "$KC"

          # Hand the bundler ONLY the identity name (NOT the certificate — see the note above).
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

          # NOTARIZATION: enable ONLY when all three creds are non-empty (see the trap above).
          # Unset otherwise → the bundler skips notarization and signs-only (self-signed).
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Notarization ENABLED (Developer ID)."
            {
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "Notarization DISABLED (sign-only — Gatekeeper will warn on a downloaded build)."
          fi

      - name: Build + upload signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing env (APPLE_*) is injected by the preceding step via $GITHUB_ENV —
          # and only when the secrets are set, so it stays truly UNSET (not empty) otherwise.
          # Do NOT re-add empty APPLE_* keys here (see the traps in the note above).
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ needs.prepare.outputs.body }}
          args: ${{ matrix.args }}

      # Linux (#362): the AppImage's internal .desktop is what every desktop integrator
      # (and ReCue's own scripts/install-linux-desktop.sh) copies into the user's menu, and
      # its StartupWMClass is what makes the running window group under that launcher icon
      # instead of showing up as a second, iconless tile. It comes from
      # bundle.linux.deb.desktopTemplate (the AppImage is packed from the deb data tree) —
      # assert the template actually took effect, so a Tauri bump that moves that seam can't
      # silently ship a mismatched entry again. Extraction *tooling* trouble only warns (a
      # runner quirk must never block a release); wrong *content* is a hard error.
      - name: Verify the AppImage desktop entry (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          app="$(ls "$GITHUB_WORKSPACE"/src-tauri/target/release/bundle/appimage/*.AppImage 2>/dev/null | head -1)"
          if [ -z "$app" ]; then
            echo "::warning::No AppImage found to verify — skipping the desktop-entry check."
            exit 0
          fi
          tmp="$(mktemp -d)"
          cd "$tmp"
          if ! "$app" --appimage-extract 'usr/share/applications/*.desktop' >/dev/null 2>&1; then
            echo "::warning::Could not extract the AppImage's desktop entry — skipping the check."
            exit 0
          fi
          f="$(find squashfs-root -name '*.desktop' | head -1)"
          if [ -z "$f" ]; then
            echo "::warning::No .desktop found inside the AppImage — skipping the check."
            exit 0
          fi
          cat "$f"
          grep -qx 'StartupWMClass=recue' "$f" || { echo "::error::StartupWMClass is not 'recue' (the window won't match its launcher)"; exit 1; }
          grep -qx 'Icon=recue' "$f" || { echo "::error::Icon is not 'recue'"; exit 1; }
          grep -qx 'Exec=recue' "$f" || { echo "::error::Exec is not 'recue' (AppRun parses that line to find the binary)"; exit 1; }
          echo "AppImage desktop entry OK: StartupWMClass/Icon/Exec = recue."

      # macOS only: when signing was enabled, assert the built .app carries the signature
      # that makes TCC grants work + persist — the necessary+sufficient precondition the
      # GUI mic prompt can't be exercised for in CI. Skipped on the ad-hoc fallback (signing
      # disabled) so a no-secrets build stays green. spctl is NOT asserted: a self-signed
      # (un-notarized) build is EXPECTED to be Gatekeeper-"rejected", which is separate from
      # TCC. A failure here means the entitlements/Hardened Runtime/identity didn't take.
      - name: Verify macOS signature (only when signing enabled)
        if: matrix.platform == 'macos-latest' && steps.applesign.outputs.signing == 'enabled'
        run: |
          set -euo pipefail
          app="$(ls -d src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app 2>/dev/null | head -1)"
          [ -n "$app" ] || { echo "::error::No .app found to verify"; exit 1; }
          echo "Verifying $app"
          info="$(codesign -dv --verbose=4 "$app" 2>&1)"
          echo "$info"
          echo "$info" | grep -qi 'flags=.*runtime' || { echo "::error::Hardened Runtime OFF (no 'runtime' flag)"; exit 1; }
          echo "$info" | grep -q 'Identifier=com.recue.app' || { echo "::error::Identifier is not com.recue.app"; exit 1; }
          codesign -d --entitlements - "$app" 2>/dev/null | grep -q 'audio-input' \
            || { echo "::error::audio-input entitlement missing from the signature"; exit 1; }
          codesign --verify --strict --verbose=2 "$app"
          dr="$(codesign -d -r - "$app" 2>&1 || true)"
          echo "$dr"
          echo "$dr" | grep -qi 'cdhash' && { echo "::error::Designated Requirement is cdhash-based → grants will NOT persist"; exit 1; }
          echo "Signature OK: Hardened Runtime + audio-input entitlement + stable cert DR."

      # macOS only: the .dmg tauri-action just built leaves its dot-prefixed helper files
      # (.background, .VolumeIcon.icns, …) unpositioned, so a user with "show hidden files"
      # on sees them auto-arranged into the install window. Park them off-canvas. This is
      # the DMG meant for manual download (NOT an updater artifact, so signatures/latest.json
      # are untouched). Best-effort — continue-on-error so a hiccup keeps the unpolished DMG.
      - name: Polish DMG (hide helper files off-canvas)
        id: polish
        if: matrix.platform == 'macos-latest'
        continue-on-error: true
        run: |
          dmg="$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null | grep -v '/rw\.' | head -1)"
          if [ -z "$dmg" ]; then echo "::warning::No DMG found to polish."; exit 0; fi
          chmod +x scripts/polish-dmg.sh
          ./scripts/polish-dmg.sh "$dmg"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      - name: Replace release DMG with the polished one
        if: matrix.platform == 'macos-latest' && steps.polish.outputs.dmg != ''
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          DMG_PATH: ${{ steps.polish.outputs.dmg }}
          DMG_NAME: ${{ steps.polish.outputs.name }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const release_id = Number(process.env.RELEASE_ID);
            const name = process.env.DMG_NAME;
            // Drop the unpolished .dmg asset tauri-action uploaded, then upload the polished
            // file under the same name. Keyed by release id (drafts aren't tag-resolvable).
            const assets = await github.rest.repos.listReleaseAssets({ owner, repo, release_id, per_page: 100 });
            for (const a of assets.data) {
              if (a.name.endsWith('.dmg')) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
                console.log(`Deleted old asset ${a.name}`);
              }
            }
            const data = fs.readFileSync(process.env.DMG_PATH);
            await github.rest.repos.uploadReleaseAsset({
              owner, repo, release_id, name,
              headers: { 'content-type': 'application/x-apple-diskimage', 'content-length': data.length },
              data,
            });
            console.log(`Uploaded polished ${name} (${data.length} bytes)`);

  tag:
    name: Tag the release commit
    # `needs: release` waits for ALL matrix legs and (with no status function in the `if`)
    # only runs when every one succeeded — so a failed/skipped build never tags the commit.
    needs: [prepare, release]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create the v<version> tag on the release commit
        # The release we just built is a DRAFT, and a draft creates no git tag until it is
        # published. Tag the triggering commit now so the commit is tagged v<version> as
        # part of the pipeline. When the maintainer later publishes the draft, GitHub finds
        # this existing tag (same commit) and associates it — no conflict.
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ needs.prepare.outputs.version }}`;
            const sha = `${{ needs.prepare.outputs.sha }}`;
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha });
              console.log(`Tagged ${sha} as ${tag}.`);
            } catch (e) {
              // 422 = the ref already exists (a re-run, or the draft was published first).
              // The commit is tagged either way — don't fail the run.
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — nothing to do.`);
              } else {
                throw e;
              }
            }
