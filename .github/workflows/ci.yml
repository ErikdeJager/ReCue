name: CI

# Pull-request gate for `main` (#345 follow-up). Runs on every PR targeting main and
# must pass before code lands, so only linted, formatted, tested, coverage-gated, and
# cross-platform-building code reaches main:
#
#   frontend  — ESLint + Prettier + type-check/build + Vitest with a ≥75% line-coverage gate
#   backend   — rustfmt + Clippy (-D warnings) + tests via cargo-llvm-cov with a ≥75% gate
#   build     — `tauri build --no-bundle` on macOS + Windows + Linux (compiles + links the
#               whole app on every OS; no installer packaging or signing)
#
# There are no automated end-to-end tests yet (the app's e2e/GUI smoke is manual — see
# TRAJECTORY_TO_WINDOWS.md / TRAJECTORY_TO_LINUX.md); when an e2e suite is added, wire it in
# as a job here. The heavy release build + signing lives in release.yml (push to main only).
#
# NOTE: making these checks *required* to merge is a branch-protection setting on `main`
# (repo Settings ▸ Branches, or `gh api`), not something a workflow file can enforce itself.

on:
  pull_request:
    branches: [main]

# One in-flight run per PR; a new push cancels the previous run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend — lint, format, type-check, test (≥75% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (format check)
        run: npm run format:check

      - name: Type-check + build
        run: npm run build

      # Runs the full Vitest suite AND enforces the coverage gate in one step: vitest exits
      # non-zero if any test fails OR line coverage is below 75% (the v8 provider is a dev
      # dependency, driven here via CLI so the local `test`/`test:coverage` scripts are
      # unchanged).
      - name: Unit tests + coverage gate (lines ≥ 75%)
        run: npx vitest run --coverage --coverage.thresholds.lines=75

  backend:
    name: Backend — rustfmt, clippy, test (≥75% coverage)
    # ubuntu-22.04 matches release.yml's Linux floor and has the Tauri 2 system libs the
    # `recue` crate needs to compile (webkit2gtk-4.1, gtk-3, …).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (clippy, rustfmt, llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            patchelf

      - name: Rustfmt (format check)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy (-D warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Runs the full Rust test suite AND enforces the coverage gate: cargo-llvm-cov exits
      # non-zero if any test fails OR line coverage is below 75%.
      - name: Tests + coverage gate (lines ≥ 75%)
        run: cargo llvm-cov --manifest-path src-tauri/Cargo.toml --fail-under-lines 75

  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            patchelf

      # Compile + link the whole app (frontend build runs via tauri's beforeBuildCommand)
      # on this OS. `--no-bundle` skips installer packaging + updater signing, so no secrets
      # are needed and fork PRs build too — it still proves the app builds on every platform.
      - name: Build (compile + link, no bundle)
        run: npx tauri build --no-bundle
