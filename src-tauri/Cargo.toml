[package]
name = "claudecue"
version = "0.0.1"
description = "ClaudeCue — run and manage many live claude CLI sessions"
authors = ["Erik de Jager"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "claudecue_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
portable-pty = "0.9.0"
thiserror = "2.0.18"
uuid = { version = "1.23.3", features = ["v4"] }
tauri-plugin-dialog = "2.7.1"
# In-app auto-update skeleton (#190, re-introducing #15 removed by #62). Inert until
# a real signing keypair is generated (deferred) — see `tauri.conf.json` placeholder
# pubkey + `createUpdaterArtifacts` off.
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2.3.1"
# 5-hour usage bar (#154): a single blocking HTTPS GET to the undocumented OAuth
# usage endpoint. ureq keeps the OAuth token in-process (never argv/logs, unlike a
# curl shell-out) and its rustls backend needs no system TLS. Used only by usage.rs.
ureq = { version = "2", features = ["json", "tls"] }

[lints.clippy]
all = "warn"
