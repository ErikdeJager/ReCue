<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReCue</title>

    <!-- Pre-paint background (#348). Every stylesheet is JS-imported (src/main.tsx), so
         until the bundle parses the document has no styles at all and the WebView paints
         its default WHITE — the startup flash. This inline style is the only styling that
         exists at first paint. Keep the hexes in sync with --bg-base in
         src/styles/tokens.css / THEME_BG in src/theme.ts / background_for_theme() in
         src-tauri/src/commands.rs (guarded by src/theme.test.ts). -->
    <style>
      html {
        background: #1e1e2e;
      }
      html[data-theme="light"] {
        background: #eff1f5;
      }
    </style>
    <script>
      // Synchronous theme mirror (#348): the real theme lives in the Rust settings blob
      // and only arrives after an async IPC, which would flash dark before flipping to
      // light. applySettingsEffects() mirrors it into localStorage (one origin, shared by
      // the main window and every detached canvas window #84) so the very first frame is
      // already correct. Best-effort: a missing/unreadable mirror keeps the dark default.
      try {
        if (localStorage.getItem("recue.theme") === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      } catch {
        /* storage unavailable — keep the dark default */
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
